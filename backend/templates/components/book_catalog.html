{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Books</title>
    <link rel="stylesheet" href="{% static 'app/style.css' %}">

</head>
<body>
    <h1>Books</h1>

{% for book in books %}
    <div>
        <h2>
            <a href="{% url 'book-detail' book.id %}">{{ book.name }}</a>
        </h2>
        <p>{{ book.details }}</p>
    </div>
{% empty %}
    <p>No books found</p>
{% endfor %}

</body>
</html>
