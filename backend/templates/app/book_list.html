{% extends "base.html" %}
{% block title %} books {% endblock %}
{% block content%}
    <h1>Books</h1>

    {% for book in books %}
    <div>
      <h2>
        <a href="{% url 'book-detail' book.pk %}">{{ book.name }}</a>
      </h2>
    </div>
    {% empty %}
    <p>No books found</p>
    {% endfor %}
{% endblock %}
